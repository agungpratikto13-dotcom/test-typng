<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Typing Speed Test Indonesia</title>

<link rel="stylesheet" href="style.css">

</head>

<body>


<div class="container">

<h1>⌨️ TES KECEPATAN MENGETIK</h1>

<div id="timer">
60
</div>


<div id="text">
Tekan tombol mulai untuk memulai tes mengetik bahasa Indonesia.
</div>


<textarea id="input" disabled></textarea>


<button onclick="mulai()" id="start">
Mulai Tes
</button>


<div class="hasil">

<p>⚡ Kecepatan : <span id="wpm">0</span> WPM</p>

<p>🎯 Akurasi : <span id="akurasi">0</span>%</p>

<p>⌨️ Karakter : <span id="karakter">0</span></p>

<p>❌ Salah : <span id="salah">0</span></p>

</div>


<div class="credit">
By Agung
</div>


</div>


<script src="script.js"></script>

</body>
</html>
